title: Developer Deep Dive Series
description: >-
  93 deeply technical articles covering Machine Learning, AI Memory, Voice Agents,
  RAG, Kafka, Redis, and LangChain — from first principles to production.
url: ""
baseurl: "/Article"

# Markdown processing
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: none
  hard_wrap: false

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-optional-front-matter
  - jekyll-default-layout

# Default front matter
defaults:
  - scope:
      path: "Machine-Learning/*-part-*"
    values:
      layout: article
      parent: Machine Learning
  - scope:
      path: "AI-Memory/*-part-*"
    values:
      layout: article
      parent: AI Memory Systems
  - scope:
      path: "Voice-Agents/*-part-*"
    values:
      layout: article
      parent: Voice Agents
  - scope:
      path: "RAG/*-part-*"
    values:
      layout: article
      parent: RAG
  - scope:
      path: "Kafka/*-part-*"
    values:
      layout: article
      parent: Apache Kafka
  - scope:
      path: "Redis/*-part-*"
    values:
      layout: article
      parent: Redis
  - scope:
      path: "LangChain/*-part-*"
    values:
      layout: article
      parent: LangChain
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default

# Exclude files from build
exclude:
  - "*.prompt"
  - "*.prompt.md"
  - "*-Prompt.md"
  - "ML-Series-Prompt.md"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - .github
  - README.md
