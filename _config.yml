title: Developer Deep Dive Series
description: >-
  93 deeply technical articles covering Machine Learning, AI Memory, Voice Agents,
  RAG, Kafka, Redis, and LangChain — from first principles to production.
url: ""
baseurl: "/Article"

remote_theme: just-the-docs/just-the-docs@v0.10.0

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-optional-front-matter
  - jekyll-default-layout

# Mermaid support (built into just-the-docs)
mermaid:
  version: "10.9.0"

# Color scheme
color_scheme: dark

# Search
search_enabled: true
search.heading_level: 3
search.previews: 3
search.preview_words_before: 5
search.preview_words_after: 10
search.tokenizer_separator: /[\s/]+/

# Navigation
nav_sort: case_insensitive

# Footer
gh_edit_link: false

# Code copy button
enable_copy_code_button: true

# Back to top button
back_to_top: true
back_to_top_text: "Back to top"

# Heading anchors
heading_anchors: true

# Default front matter for all pages
defaults:
  - scope:
      path: "Machine-Learning"
      type: "pages"
    values:
      layout: default
      parent: Machine Learning
      grand_parent: Series
  - scope:
      path: "AI-Memory"
      type: "pages"
    values:
      layout: default
      parent: AI Memory Systems
      grand_parent: Series
  - scope:
      path: "Voice-Agents"
      type: "pages"
    values:
      layout: default
      parent: Voice Agents
      grand_parent: Series
  - scope:
      path: "RAG"
      type: "pages"
    values:
      layout: default
      parent: RAG
      grand_parent: Series
  - scope:
      path: "Kafka"
      type: "pages"
    values:
      layout: default
      parent: Apache Kafka
      grand_parent: Series
  - scope:
      path: "Redis"
      type: "pages"
    values:
      layout: default
      parent: Redis
      grand_parent: Series
  - scope:
      path: "LangChain"
      type: "pages"
    values:
      layout: default
      parent: LangChain
      grand_parent: Series
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default

# Exclude files from build
exclude:
  - "*.prompt"
  - "*.prompt.md"
  - "*-Prompt.md"
  - "ML-Series-Prompt.md"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - .github
